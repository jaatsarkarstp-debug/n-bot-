<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nboat - Perplexity Engine V1</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg-dark: #0f111a; --surface: #1e2130; --primary: #00ff88; --text: #e2e8f0; --accent: #7c3aed; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { background: rgba(30, 33, 48, 0.8); backdrop-filter: blur(10px); padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area i { font-size: 2rem; color: var(--primary); text-shadow: 0 0 15px rgba(0,255,136,0.5); }
        .engine-status { font-size: 0.8rem; background: rgba(0,255,136,0.1); color: var(--primary); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--primary); letter-spacing: 1px; }

        .chat-core { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; scroll-behavior: smooth; }
        .message-row { display: flex; gap: 1rem; max-width: 85%; animation: fadeIn 0.3s ease-in; }
        .message-row.user { align-self: flex-end; flex-direction: row-reverse; }
        .message-row.ai { align-self: flex-start; }
        
        .avatar { width: 40px; height: 40px; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: bold; flex-shrink: 0; }
        .user .avatar { background: var(--accent); }
        .ai .avatar { background: #2d3748; border: 1px solid var(--primary); color: var(--primary); }
        
        .bubble { padding: 1.2rem; border-radius: 12px; line-height: 1.6; font-size: 0.95rem; letter-spacing: 0.3px; }
        .user .bubble { background: var(--accent); color: white; border-top-right-radius: 2px; }
        .ai .bubble { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); border-top-left-radius: 2px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

        .think-process { font-size: 0.85rem; color: #94a3b8; border-left: 3px solid var(--primary); padding-left: 10px; margin-bottom: 10px; font-style: italic; display: none; }
        .ai.perplexity .think-process { display: block; }

        .input-matrix { background: var(--surface); padding: 1.5rem 2rem; border-top: 1px solid rgba(255,255,255,0.05); }
        .input-wrapper { display: flex; gap: 1rem; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
        .input-wrapper:focus-within { border-color: var(--primary); box-shadow: 0 0 20px rgba(0,255,136,0.1); }
        
        textarea { flex: 1; background: transparent; border: none; color: white; padding: 10px; font-size: 1rem; resize: none; outline: none; height: 50px; }
        
        .control-btn { background: var(--primary); color: #000; border: none; border-radius: 10px; padding: 0 25px; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .control-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--primary); }
        .control-btn:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; box-shadow: none; transform: none; }

        .auth-gate { position: fixed; inset: 0; background: rgba(15,17,26,0.95); z-index: 999; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .auth-box { background: var(--surface); padding: 3rem; border-radius: 20px; border: 1px solid var(--primary); text-align: center; box-shadow: 0 0 50px rgba(0,255,136,0.1); width: 400px; }
        .auth-input { width: 100%; padding: 12px; margin: 20px 0; background: rgba(0,0,0,0.5); border: 1px solid #475569; color: white; border-radius: 8px; outline: none; }
        .auth-input:focus { border-color: var(--primary); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="auth-gate" id="authGate">
        <div class="auth-box">
            <i class="fas fa-microchip" style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <h2>System Initialization</h2>
            <p style="color: #94a3b8; margin-top: 10px; font-size: 0.9rem;">Enter Gemini API Key to ignite the core.</p>
            <input type="password" id="keyInput" class="auth-input" placeholder="AIzaSy...">
            <button class="control-btn" style="width: 100%; justify-content: center; padding: 15px;" onclick="initEngine()">Ignite Engine <i class="fas fa-power-off"></i></button>
        </div>
    </div>

    <header class="header">
        <div class="logo-area">
            <i class="fas fa-brain"></i>
            <h2>nboat <span style="font-weight: 300; opacity: 0.7;">Core</span></h2>
        </div>
        <div class="engine-status">
            <i class="fas fa-bolt"></i> PERPLEXITY MODE ACTIVE
        </div>
    </header>

    <div class="chat-core" id="chatCore"></div>

    <div class="input-matrix">
        <div class="input-wrapper">
            <textarea id="promptInput" placeholder="Enter query for deep analysis... (Ctrl+Enter to execute)"></textarea>
            <button id="execBtn" class="control-btn" onclick="executeQuery()">
                <span>EXECUTE</span> <i class="fas fa-terminal"></i>
            </button>
        </div>
    </div>

    <script>
        let apiKey = "";
        let activeModel = ""; // Isme radar khud model name bharega
        const SYSTEM_PROMPT = `You are nboat, a highly advanced analytical engine inspired by Perplexity AI. 
        Your primary directive is to provide extremely detailed, technically accurate, and structured answers.
        Rule 1: Always break down complex topics into step-by-step logical components.
        Rule 2: Speak with the authority of a senior systems engineer.
        Rule 3: Use bullet points, bold text, and code blocks to structure data perfectly.
        Rule 4: Be direct, brutal with facts, and highly intelligent.`;

        // THE AUTO-DETECT RADAR
        async function initEngine() {
            const key = document.getElementById('keyInput').value.trim();
            if(!key) { alert("Core requires a valid key!"); return; }
            apiKey = key;
            document.getElementById('authGate').style.display = 'none';
            spawnMessage('ai', "Engine Ignited. Bypassing manual model selection... Auto-detecting the most advanced Google core available for your key...");
            
            try {
                // Google se saare live models ki list maango
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                const data = await res.json();
                
                if(data.error) throw new Error(data.error.message);
                
                // Jo models chalne layek hain unhe filter karo
                const validModels = data.models.filter(m => m.supportedGenerationMethods && m.supportedGenerationMethods.includes('generateContent') && m.name.includes('gemini'));
                
                if(validModels.length === 0) throw new Error("No active models found for this API Key.");
                
                // Sabse best/fast model lock karo
                let selected = validModels.find(m => m.name.includes('flash'));
                if(!selected) selected = validModels[0];
                
                activeModel = selected.name; 
                
                spawnMessage('ai', `SUCCESS! Handshake complete. Locked onto core: **${activeModel}**. Perplexity Mode is fully armed and awaiting input. 🚀`);
            } catch(err) {
                spawnMessage('ai', "CRITICAL CONNECTION ERROR: " + err.message);
            }
        }

        function spawnMessage(role, text) {
            const core = document.getElementById('chatCore');
            const row = document.createElement('div');
            row.className = `message-row ${role} perplexity`;
            
            let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            formattedText = formattedText.replace(/\n/g, '<br>');

            row.innerHTML = `
                <div class="avatar">${role === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-network-wired"></i>'}</div>
                <div class="bubble">
                    ${role === 'ai' ? '<div class="think-process">Analyzing query parameters... cross-referencing internal data... generating structured output...</div>' : ''}
                    <div class="content">${formattedText}</div>
                </div>
            `;
            core.appendChild(row);
            core.scrollTop = core.scrollHeight;
        }

        async function executeQuery() {
            if(!activeModel) {
                spawnMessage('ai', "Hold on! Core handshake is still processing...");
                return;
            }

            const inputField = document.getElementById('promptInput');
            const btn = document.getElementById('execBtn');
            const query = inputField.value.trim();
            
            if(!query) return;

            inputField.value = "";
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> PROCESSING`;
            spawnMessage('user', query);

            const payload = {
                contents: [{ role: "user", parts: [{ text: SYSTEM_PROMPT + "\n\nUser Query: " + query }] }],
                generationConfig: { temperature: 0.2, maxOutputTokens: 2048 }
            };

            try {
                // Ab URL mein hardcoded naam nahi, activeModel pass hoga!
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${activeModel}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if(!response.ok) throw new Error(data.error?.message || "API Override Failure");
                
                const aiResponse = data.candidates[0].content.parts[0].text;
                spawnMessage('ai', aiResponse);

            } catch(err) {
                spawnMessage('ai', "CRITICAL ERROR: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span>EXECUTE</span> <i class="fas fa-terminal"></i>`;
                inputField.focus();
            }
        }

        document.getElementById('promptInput').addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); executeQuery(); }
        });
    </script>
</body>
</html>
